name: skeleton_core
description: A reusable Flutter game-shell package providing common screens, models, blocs, and services.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.2.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: any

  # UI
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.7.0

  # State management
  flutter_bloc: ^8.1.4

  # Seasonal theme (lunar calendar)
  lunar: ^1.7.8

  # Persistence
  shared_preferences: ^2.2.3

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

  # Media & Haptics
  audioplayers: ^5.2.1
  vibration: ^3.1.3

  # Utilities
  package_info_plus: ^8.3.0
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1
  share_plus: ^7.2.2
  fluttertoast: ^8.2.12
  crypto: ^3.0.6
  uuid: ^4.5.1
  qr_flutter: ^4.1.0

dependency_overrides:
  win32: ^5.5.4

flutter:
  uses-material-design: true
